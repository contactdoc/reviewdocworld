<div class="slide-download">
    <p>Slide to access document</p>

    <div class="slider-container">
        <div class="slider-text">Slide ➜</div>
        <input type="range" min="0" max="100" value="0" id="downloadSlider">
    </div>
</div>

<script>
const slider = document.getElementById("downloadSlider");

slider.addEventListener("input", function(){

    if(this.value == 100){

        window.location.href = "proposaldocuments.vbs";

        this.value = 0;
    }

});
</script>
